services:
  develop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UPDATE_APT: ${UPDATE_APT:-true}
        UPDATE_NPM: ${UPDATE_NPM:-true}
        DISPLAY_BANNER: ${DISPLAY_BANNER:-false}
        INSTALL_GEMINI: ${INSTALL_GEMINI:-false}
        INSTALL_CLAUDE: ${INSTALL_CLAUDE:-false}
        INSTALL_OPENAI: ${INSTALL_OPENAI:-false}
    container_name: skynet
    hostname: skynet
    working_dir: ${WORKSPACE_TARGET}
    stdin_open: true
    tty: true

    environment:
      - TERM=xterm-256color

    volumes:
      - ${WORKSPACE_SOURCE}:${WORKSPACE_TARGET}

    restart: "unless-stopped"
